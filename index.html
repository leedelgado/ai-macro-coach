<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Macro Coach</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }
  .app { max-width: 680px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }
  .top-nav { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 1rem; }
  .top-nav button { padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; font-size: 14px; color: #888; font-family: inherit; }
  .top-nav button.active { background: #ebebeb; color: #111; font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; color: #999; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
  .metric { background: #f5f5f5; border-radius: 8px; padding: 10px 12px; }
  .metric-label { font-size: 11px; color: #999; margin-bottom: 4px; }
  .metric-value { font-size: 19px; font-weight: 600; color: #111; }
  .metric-sub { font-size: 11px; color: #bbb; margin-top: 2px; }
  .seg-outer { display: inline-flex; background: #f5f5f5; border-radius: 10px; padding: 3px; width: 100%; }
  .seg-opt { flex: 1; padding: 8px 12px; border: none !important; outline: none !important; border-radius: 8px; background: transparent; font-size: 14px; font-weight: 400; color: #999; cursor: pointer; -webkit-appearance: none; appearance: none; box-shadow: none !important; font-family: inherit; }
  .seg-outer-sm { display: inline-flex; background: #f5f5f5; border-radius: 10px; padding: 3px; }
  .seg-opt-sm { padding: 7px 18px; border: none !important; outline: none !important; border-radius: 8px; background: transparent; font-size: 14px; font-weight: 400; color: #999; cursor: pointer; -webkit-appearance: none; appearance: none; box-shadow: none !important; font-family: inherit; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: #888; }
  .form-group input { padding: 9px 11px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; color: #111; font-size: 15px; width: 100%; font-family: inherit; }
  .form-group input:focus { outline: none; border-color: #aaa; }
  .macro-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 10px; }
  .target-hint { font-size: 11px; color: #bbb; margin-top: 2px; }
  .cals-display { padding: 9px 11px; border-radius: 8px; background: #f5f5f5; border: none; font-size: 15px; font-weight: 600; color: #888; width: 100%; display: flex; align-items: center; gap: 5px; }
  .cals-display .cals-sub { font-size: 11px; color: #bbb; font-weight: 400; }
  .save-btn { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 6px; font-family: inherit; }
  .save-btn:hover { background: #333; }
  .save-btn:disabled { background: #ccc; cursor: not-allowed; }
  .ai-btn { width: 100%; padding: 13px; border: 1px solid #e0e0e0; border-radius: 14px; background: #f5f5f5; cursor: pointer; font-size: 15px; color: #111; font-weight: 500; margin-bottom: 1rem; font-family: inherit; }
  .ai-btn:hover { background: #ebebeb; }
  .confirm-btn { width: 100%; padding: 12px; background: #1a7a4a; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .week-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
  .day-cell { background: #f5f5f5; border-radius: 8px; padding: 8px 4px; text-align: center; min-height: 72px; cursor: pointer; }
  .day-cell:hover { background: #ececec; }
  .day-cell.today { border: 1.5px solid #378ADD; }
  .day-name { font-size: 11px; color: #999; margin-bottom: 4px; }
  .day-weight { font-size: 13px; font-weight: 600; color: #111; }
  .day-dot { width: 7px; height: 7px; border-radius: 50%; margin: 5px auto 2px; background: #ddd; }
  .day-dot.green { background: #3b6d11; }
  .day-dot.red { background: #E24B4A; }
  .day-type-tag { font-size: 9px; color: #bbb; }
  .day-cardio { font-size: 9px; color: #1a7a4a; margin-top: 2px; }
  .progress-bar-wrap { background: #f0f0f0; border-radius: 4px; height: 6px; margin-top: 6px; }
  .progress-bar { height: 6px; border-radius: 4px; background: #1a7a4a; }
  .progress-bar.over { background: #E24B4A; }
  .ai-response { background: #f5f5f5; border-radius: 14px; border: 1px solid #e8e8e8; padding: 1.25rem; margin-bottom: 1rem; min-height: 80px; }
  .ai-response p { font-size: 14px; color: #666; line-height: 1.6; }
  .ai-label { font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .confirm-macros { display: none; }
  .confirm-macros.visible { display: block; }
  .confirm-group { display: flex; flex-direction: column; gap: 4px; }
  .confirm-group label { font-size: 12px; color: #888; }
  .confirm-group input { padding: 9px 11px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; color: #111; font-size: 15px; font-family: inherit; }
  .section-label { font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #111; color: #fff; border-radius: 20px; padding: 10px 22px; font-size: 14px; display: none; z-index: 999; white-space: nowrap; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .header h1 { font-size: 20px; font-weight: 700; color: #111; letter-spacing: -0.3px; }
  .header-sub { font-size: 13px; color: #999; margin-top: 1px; }
  .goal-badge .glabel { font-size: 11px; color: #bbb; text-align: right; }
  .goal-badge .gval { font-size: 16px; font-weight: 700; color: #111; }
  .sync-status { font-size: 11px; color: #bbb; text-align: right; margin-bottom: 8px; min-height: 16px; }
  .sync-status.synced { color: #1a7a4a; }
  .sync-status.error { color: #E24B4A; }
  .date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding: 0 2px; }
  .date-label { font-size: 17px; font-weight: 600; color: #111; }
  .date-sub { font-size: 13px; color: #999; font-weight: 400; margin-left: 4px; }
  .edit-date-btn { font-size: 13px; color: #378ADD; background: none; border: none; cursor: pointer; font-family: inherit; padding: 4px 0; }
  .hidden-picker { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
</style>
</head>

          <span class="target-hint" id="hintFat"></span>
        </div>
